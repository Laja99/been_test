# ─────────────────────────────────────────────
# docker-compose.yml
# ─────────────────────────────────────────────
#
#   docker compose up -d
#   docker compose up -d --build
#   docker compose down
#   docker compose logs -f api
#
# ─────────────────────────────────────────────

services:

  # ─────────────────────────────────────────
  # PostgreSQL
  # ─────────────────────────────────────────
  postgres:
    image: postgres:15
    container_name: bayn_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: bayn_db
      POSTGRES_USER: bayn_user
      POSTGRES_PASSWORD: bayn_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bayn_user -d bayn_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # FastAPI Application
  # ─────────────────────────────────────────
  api:
    build: .
    container_name: bayn_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://bayn_user:bayn_pass@postgres:5432/bayn_db
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./bayn:/app/bayn
    command: >
      uvicorn bayn.main:app
      --host 0.0.0.0
      --port 8000
      --reload

volumes:
  postgres_data:
    name: bayn_postgres_data
    