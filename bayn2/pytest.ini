[pytest]
# asyncio_mode=auto = كل test يحتوي على async يعمل تلقائياً بدون decorator
asyncio_mode = auto

# testpaths = مجلد التستات
testpaths = tests

# addopts:
# -v  = verbose output
# --tb=short = رسائل خطأ مختصرة
# -q  = quiet (اختياري، احذفه إذا تريد تفاصيل أكثر)
addopts = -v --tb=short

# نتجاهل تحذيرات معينة
filterwarnings =
    ignore::DeprecationWarning
    ignore::pytest.PytestUnraisableExceptionWarning
